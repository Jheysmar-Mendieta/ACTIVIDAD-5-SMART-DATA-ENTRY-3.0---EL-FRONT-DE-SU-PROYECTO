<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMC — Terminal de Datos</title>

  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="card">

  <!-- Encabezado -->
  <div class="card-header">
    <div class="card-logo"><span>[</span>SIMC<span>]</span></div>
    <h2 class="card-title">Registro de Sesión de Monitoreo</h2>
  </div>

  <div class="divider"></div>

  <!-- FORMULARIO -->
  <form class="form" id="simcForm">

    <!-- Nombre y Apellido -->
    <div class="row-2">
      <div class="field">
        <label><i class="fas fa-user"></i> Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Juan" required />
        <span class="hint" id="hint-nombre"></span>
      </div>

      <div class="field">
        <label><i class="fas fa-user"></i> Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="García" required />
        <span class="hint" id="hint-apellido"></span>
      </div>
    </div>

    <!-- Correo -->
    <div class="field">
      <label><i class="fas fa-envelope"></i> Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="usuario@ejemplo.com" required />
      <span class="hint" id="hint-correo"></span>
    </div>

    <!-- Entorno -->
    <div class="field">
      <label><i class="fas fa-building"></i> Entorno de uso</label>
      <select id="entorno" name="entorno" required>
        <option value="" disabled selected>Seleccionar...</option>
        <option value="educativo">Educativo</option>
        <option value="industrial">Industrial</option>
        <option value="familiar">Familiar</option>
      </select>
    </div>

    <!-- ACTIVIDAD -->
    <div class="field">
      <label><i class="fas fa-brain"></i> Tipo de actividad</label>
      <select id="actividad" name="actividad" required>
        <option value="" disabled selected>Seleccionar...</option>
        <option value="estudio">Estudio</option>
        <option value="trabajo">Trabajo</option>
        <option value="lectura">Lectura</option>
        <option value="otro">Otro</option>
      </select>
    </div>

    <!-- CHECKBOXES -->
    <div class="field">
      <label><i class="fas fa-triangle-exclamation"></i> Condiciones del entorno</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="condiciones" value="ruido"> Ruido</label>
        <label><input type="checkbox" name="condiciones" value="poca_luz"> Poca luz</label>
        <label><input type="checkbox" name="condiciones" value="distracciones"> Distracciones</label>
      </div>
    </div>

    <!-- Observaciones -->
    <div class="field">
      <label><i class="fas fa-comment-dots"></i> Observaciones</label>
      <textarea id="observaciones" name="observaciones" placeholder="Condiciones del entorno..."></textarea>
      <small id="contadorObs">0 caracteres</small>
    </div>

    <!-- Imagen -->
    <div class="field">
      <label><i class="fas fa-image"></i> Foto del entorno</label>
      <div class="preview-area">
        <input type="file" id="fotoEntorno" name="foto" accept="image/*" />
        <div class="preview-placeholder" id="placeholder">
          <i class="fas fa-cloud-arrow-up"></i>
          <p>Clic para seleccionar imagen</p>
        </div>
        <img id="imgPreview" src="" alt="Vista previa" />
      </div>
    </div>

    <!-- Botón -->
    <button type="submit" class="btn-submit">
      <i class="fas fa-satellite-dish"></i>
      ENVIAR SESIÓN
    </button>

  </form>

</div>

<script src="js/script.js"></script>
</body>
</html>
